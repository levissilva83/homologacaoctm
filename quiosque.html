<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>CT Manager — Quiosque</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;}
    #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
    video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.18;transform:scaleX(-1);}
    #overlay{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;width:100%;max-width:640px;}
    #logo{font-size:22px;font-weight:800;letter-spacing:2px;color:#C9A23A;text-transform:uppercase;}
    #emoji{font-size:96px;line-height:1;transition:transform .2s;}
    #title{font-size:30px;font-weight:800;}
    #sub{font-size:16px;color:rgba(255,255,255,.6);}
    .ring{width:240px;height:240px;border-radius:50%;border:3px solid rgba(201,162,58,.35);display:flex;align-items:center;justify-content:center;}
    .ring.scan{border-color:#3b82f6;animation:pulse 1.2s infinite;}
    .ring.ok{border-color:#22c55e;}
    .ring.err{border-color:#f87171;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,130,246,.4);}70%{box-shadow:0 0 0 24px rgba(59,130,246,0);}100%{box-shadow:0 0 0 0 rgba(59,130,246,0);}}
    #result{display:none;flex-direction:column;gap:6px;}
    #rName{font-size:34px;font-weight:900;color:#fff;}
    #rBelt{font-size:18px;color:#C9A23A;font-weight:700;}
    #rTime{font-size:15px;color:rgba(255,255,255,.6);}
    #start{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#000;cursor:pointer;}
    #start .btn{padding:16px 34px;background:linear-gradient(135deg,#C9A23A,#8C6A0A);color:#000;border:none;border-radius:14px;font-size:18px;font-weight:800;}
    #setup{position:fixed;inset:0;z-index:6;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000;padding:30px;text-align:center;}
    .muted{color:rgba(255,255,255,.5);font-size:13px;max-width:360px;line-height:1.6;}
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="cv" style="display:none;"></canvas>

  <div id="wrap"><div id="overlay">
    <div id="logo">CT MANAGER</div>
    <div class="ring" id="ring"><div id="emoji">🥋</div></div>
    <div id="title">Posicione seu rosto</div>
    <div id="sub">Check-in automático</div>
    <div id="result">
      <div id="rName"></div>
      <div id="rBelt"></div>
      <div id="rTime"></div>
    </div>
  </div></div>

  <div id="start">
    <div id="logo2" style="font-size:22px;font-weight:800;letter-spacing:2px;color:#C9A23A;">CT MANAGER</div>
    <div style="font-size:54px;">🥋</div>
    <div class="muted" style="margin-bottom:-4px;">Selecione a turma deste tablet:</div>
    <select id="horarioSelect" style="padding:12px 16px;border-radius:10px;border:1px solid rgba(201,162,58,.4);background:#111;color:#fff;font-size:15px;min-width:240px;text-align:center;">
      <option value="">Carregando horários...</option>
    </select>
    <button class="btn" id="startBtn">Iniciar Quiosque</button>
    <div class="muted">Toque para ligar a câmera e ativar o modo recepção.</div>
  </div>

  <div id="setup">
    <div style="font-size:48px;">🔒</div>
    <div style="font-size:18px;font-weight:800;">Quiosque não configurado</div>
    <div class="muted" id="setupMsg">Abra o quiosque pelo painel do CT (Sistema → Quiosque Facial → Abrir Quiosque) para autenticar este tablet.</div>
  </div>

  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWwOSEW2dw2EioooNWWd62VMDCmBl9A271jejNJTXeTfSt94_eyIttNJseDQvTW10u/exec';

    var ENV = {
      token: null, ct: '', confidence: 90, cameraMode: 'user',
      som: true, tempoRetorno: 3, permitirVisitante: false, horario: ''
    };
    var STATE = 'idle';           // idle | scan | success | error | cooldown
    var lastFrame = null;         // p/ detecção de movimento
    var loopTimer = null, busy = false;
    var ultimoCheckin = {};       // email -> timestamp (anti-duplicidade 5 min)

    function $(id){ return document.getElementById(id); }
    function getToken(){
      try { var s = JSON.parse(localStorage.getItem('bjjSession')||'null');
        if (!s || !s.token) return null;
        if (s.expiresAt && Date.now() > s.expiresAt) return null;
        return s.token; } catch(e){ return null; }
    }
    function getCtParam(){
      var m = location.search.match(/[?&]ctm=([^&]+)/);
      if (m) return decodeURIComponent(m[1]);
      try { var u = JSON.parse(localStorage.getItem('bjjUser')||'null'); if (u && u.ct) return u.ct; } catch(e){}
      return '';
    }
    async function api(action, payload){
      var body = Object.assign({}, payload||{}, { action: action });
      if (ENV.token) body.token = ENV.token;
      body._origin = location.origin + '/';
      var r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(body) });
      return await r.json();
    }

    // ── Estados visuais ──────────────────────────────────────
    function setState(st, opts){
      opts = opts || {};
      STATE = st;
      var ring = $('ring'), emoji = $('emoji'), title = $('title'), sub = $('sub'), result = $('result');
      ring.className = 'ring' + (st==='scan'?' scan':st==='success'?' ok':st==='error'?' err':'');
      result.style.display = 'none';
      if (st==='idle'){ emoji.textContent='🥋'; emoji.style.display='block'; title.textContent='Posicione seu rosto'; sub.textContent='Check-in automático'; }
      else if (st==='scan'){ emoji.textContent='🔍'; emoji.style.display='block'; title.textContent='Identificando aluno...'; sub.textContent=''; }
      else if (st==='success'){
        emoji.style.display='none'; title.textContent=''; sub.textContent='';
        result.style.display='flex';
        $('rName').textContent = opts.nome || 'Aluno';
        $('rBelt').textContent = '✅ Presença Confirmada' + (opts.faixa? ' · '+opts.faixa : '');
        $('rTime').textContent = opts.hora || '';
        if (ENV.som) beep();
      }
      else if (st==='error'){ emoji.textContent='❌'; emoji.style.display='block'; title.textContent= opts.msg || 'Aluno não identificado'; sub.textContent=''; }
    }

    function beep(){
      try {
        var ctx = new (window.AudioContext||window.webkitAudioContext)();
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type='sine'; o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
        o.start(); o.stop(ctx.currentTime+0.36);
      } catch(e){}
    }

    // ── Câmera ───────────────────────────────────────────────
    async function startCamera(){
      try {
        var stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: ENV.cameraMode || 'user', width:{ideal:640}, height:{ideal:480} }, audio:false
        });
        $('cam').srcObject = stream;
        return true;
      } catch(e){ return false; }
    }

    // detecção simples de movimento (downscale 32x32 + diff médio)
    function temMovimento(){
      var video = $('cam'), cv = $('cv');
      if (!video.videoWidth) return false;
      cv.width = 32; cv.height = 32;
      var ctx = cv.getContext('2d');
      ctx.drawImage(video, 0, 0, 32, 32);
      var cur = ctx.getImageData(0,0,32,32).data;
      var movimento = true, soma = 0;
      if (lastFrame){
        var diff = 0;
        for (var i=0;i<cur.length;i+=4){ diff += Math.abs(cur[i]-lastFrame[i]); }
        var media = diff / (cur.length/4);
        movimento = media > 8;     // limiar de movimento
      }
      lastFrame = cur;
      // também ignora cena muito escura (ninguém / tampado)
      for (var b=0;b<cur.length;b+=4){ soma += cur[b]+cur[b+1]+cur[b+2]; }
      var brilho = soma / (cur.length/4) / 3;
      return movimento && brilho > 25;
    }

    function capturarBase64(){
      var video = $('cam'), cv = $('cv');
      if (!video.videoWidth) return null;
      cv.width = 480; cv.height = Math.round(480 * video.videoHeight / video.videoWidth);
      cv.getContext('2d').drawImage(video, 0, 0, cv.width, cv.height);
      return cv.toDataURL('image/jpeg', 0.8).split(',')[1];
    }

    // ── Loop principal ───────────────────────────────────────
    function iniciarLoop(){
      if (loopTimer) clearInterval(loopTimer);
      // [ALTERADO 2026-06-20] De 1500ms para 9000ms. O reconhecimento agora
      // usa IA com visão computacional (handleReconhecerAlunoQuiosque —
      // mesma tecnologia do módulo "Foto"), que custa mais por chamada do
      // que o antigo searchFaceRek (nunca chegou a funcionar de fato).
      // Intervalo maior mantém o custo viável sem perder a automação por
      // detecção de movimento.
      loopTimer = setInterval(tick, 9000);
    }
    async function tick(){
      if (busy || STATE === 'success' || STATE === 'scan' || STATE === 'cooldown') return;
      if (!temMovimento()) return;
      var b64 = capturarBase64();
      if (!b64) return;
      busy = true;
      setState('scan');
      try {
        // [ALTERADO 2026-06-20] reconhecerAlunoQuiosque substitui o antigo
        // searchFaceRek — usa a mesma tecnologia de IA do módulo "Foto"
        // (visão computacional via Claude), restrita aos alunos esperados
        // no horário selecionado (não compara contra todos do CT).
        var res = await api('reconhecerAlunoQuiosque', { fotoBase64: b64, ct: ENV.ct, horario: ENV.horario || '' });
        if (res && res.success && res.match && (res.match.confianca||0) >= ENV.confidence){
          await confirmar(res.match);
        } else if (res && res.success) {
          flashErro('Aluno não identificado');
        } else {
          flashErro((res && res.message) || 'Erro ao identificar');
        }
      } catch(e){ flashErro('Falha de conexão'); }
      busy = false;
    }

    function flashErro(msg){
      setState('error', { msg: msg });
      STATE = 'cooldown';
      setTimeout(function(){ if (STATE==='cooldown'){ setState('idle'); } }, 1800);
    }

    async function confirmar(m){
      var agora = Date.now();
      // anti-duplicidade local: 5 min
      if (ultimoCheckin[m.email] && (agora - ultimoCheckin[m.email]) < 5*60*1000){
        setState('success', { nome: m.nome, faixa: m.faixa, hora: 'Presença já confirmada' });
        STATE = 'cooldown';
        setTimeout(voltarIdle, ENV.tempoRetorno*1000);
        return;
      }
      try {
        var r = await api('registrarPresencaFacial', { email: m.email });
        ultimoCheckin[m.email] = agora;
        var hora = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
        setState('success', { nome: m.nome, faixa: m.faixa, hora: '🕐 ' + hora });
      } catch(e){
        setState('success', { nome: m.nome, faixa: m.faixa, hora: '' });
      }
      STATE = 'cooldown';
      setTimeout(voltarIdle, ENV.tempoRetorno*1000);
    }
    function voltarIdle(){ lastFrame = null; setState('idle'); }

    // [NOVO 2026-06-20] Carrega os horários de aula do CT, para restringir
    // o reconhecimento facial aos alunos esperados na turma selecionada
    // (essencial para manter o custo/velocidade da IA viáveis).
    async function carregarHorarios(){
      var sel = $('horarioSelect');
      if (!sel) return;
      sel.innerHTML = '<option value="">Carregando horários...</option>';
      try {
        var res = await api('getHorariosCT', { ct: ENV.ct });
        var unique = {};
        if (res && res.success && res.slotsPorMod) {
          Object.keys(res.slotsPorMod).forEach(function(modId){
            (res.slotsPorMod[modId] || []).forEach(function(t){ unique[t] = true; });
          });
        }
        var times = Object.keys(unique).sort();
        var h = '';
        if (times.length === 0) {
          h = '<option value="">Turma única (sem grade de horários)</option>';
        } else {
          h = '<option value="">Selecione o horário da turma...</option>';
          times.forEach(function(t){ h += '<option value="' + t + '">🕐 ' + t + '</option>'; });
        }
        sel.innerHTML = h;
      } catch(e) {
        sel.innerHTML = '<option value="">Turma única (sem grade de horários)</option>';
      }
    }

    // ── Boot ─────────────────────────────────────────────────
    async function boot(){
      ENV.token = getToken();
      ENV.ct = getCtParam();
      if (!ENV.token){ $('start').style.display='none'; $('setup').style.display='flex'; return; }
      // carrega config
      try {
        var res = await api('getQuiosqueConfig', { ct: ENV.ct });
        if (res && res.success && res.config){
          var c = res.config;
          ENV.confidence = c.confidence || 90;
          ENV.cameraMode = c.camera_mode || 'user';
          ENV.som = c.som_confirmacao !== false;
          ENV.tempoRetorno = c.tempo_retorno || 3;
          ENV.permitirVisitante = !!c.permitir_visitante;
          if (c.cliente_id) ENV.ct = c.cliente_id;
          if (c.ativo === false){
            $('start').style.display='none'; $('setup').style.display='flex';
            $('setupMsg').textContent = 'O Quiosque Facial está desativado para este CT. Ative em Sistema → Quiosque Facial.';
            return;
          }
        }
      } catch(e){}
      await carregarHorarios();
      $('startBtn').onclick = async function(){
        ENV.horario = ($('horarioSelect') && $('horarioSelect').value) || '';
        var ok = await startCamera();
        if (!ok){ $('setupMsg').textContent = 'Não foi possível acessar a câmera. Verifique as permissões do navegador.'; $('setup').style.display='flex'; return; }
        try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch(e){}
        $('start').style.display='none';
        setState('idle');
        iniciarLoop();
      };
    }
    boot();
  </script>
</body>
</html>
